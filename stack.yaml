resolver: lts-24.38

# Prefer whatever GHC is on PATH (ghcup's, system's, etc.) as long as
# its version matches the resolver. If none matches (e.g. on a fresh
# CI runner), Stack will install its own — that's the default.
system-ghc: true

packages:
  - .

extra-deps:
  - git: https://github.com/someodd/venusia.git
    commit: 2546ac14cfe2ea0ba9e76e804b20a4bd06e456f5
