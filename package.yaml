name:                bartleby
version:             0.1.0.0
synopsis:            A scrivener for gopherspace
description:         See README.md and bartleby-plan.md.
license:             GPL-3.0-or-later
license-file:        LICENSE
author:              someodd
maintainer:          someodd@pm.me
copyright:           2026 someodd
category:            Network

extra-source-files:
  - README.md
  - bartleby-plan.md

default-extensions:
  - OverloadedStrings

ghc-options:
  - -Wall
  - -Wcompat
  - -Widentities
  - -Wincomplete-record-updates
  - -Wincomplete-uni-patterns
  - -Wmissing-export-lists
  - -Wmissing-home-modules
  - -Wpartial-fields
  - -Wredundant-constraints

dependencies:
  - base >= 4.18 && < 5

library:
  source-dirs: src
  language: GHC2021
  dependencies:
    - text
    - bytestring
    - containers
    - yaml
    - aeson
    - filepath
    - directory
    - time
    - Venusia
    - liquidhaskell

executables:
  bartleby:
    main:              Main.hs
    source-dirs:       app
    language:          GHC2021
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - bartleby

tests:
  bartleby-test:
    main:              Spec.hs
    source-dirs:       test
    language:          GHC2021
    ghc-options:
      - -threaded
    build-tools:
      - hspec-discover
    dependencies:
      - bartleby
      - hspec
      - QuickCheck
      - filepath
      - directory
      - text
      - bytestring
      - time
